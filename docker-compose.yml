services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mpa
      POSTGRES_USER: mpa
      POSTGRES_PASSWORD: mpa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mpa -d mpa"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://mpa:mpa@db:5432/mpa
      STORAGE_DIR: /app/storage
      LOG_LEVEL: INFO
      CORS_ORIGINS: '["http://localhost:3000", "http://127.0.0.1:3000"]'
      TESSERACT_CMD: /usr/bin/tesseract
      LM_STUDIO_ENABLED: ${LM_STUDIO_ENABLED:-false}
      LM_STUDIO_BASE_URL: ${LM_STUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
      LM_STUDIO_VLM_MODEL: ${LM_STUDIO_VLM_MODEL:-google/gemma-4-12b}
      LM_STUDIO_EMBEDDING_ENABLED: ${LM_STUDIO_EMBEDDING_ENABLED:-false}
      LM_STUDIO_EMBEDDING_MODEL: ${LM_STUDIO_EMBEDDING_MODEL:-text-embedding-nomic-embed-text-v1.5}
    ports:
      - "8000:8000"
    volumes:
      - api_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  api_storage:
